# -----------------------------------------------------------------------------
# Dgaard Configuration File
# -----------------------------------------------------------------------------

[server]
# The address and port your proxy listens on (usually port 53 for DNS)
listen_addr = "192.168.1.1:53"
# Networks allowed to use this proxy (Access Control List)
allowed_networks = ["127.0.0.1/32", "192.168.1.0/24"]
# Port for the Unix Socket stats stream
stats_socket_path = "/tmp/dgaard_stats.sock"

# Reject any domain containing non-ANSI characters (Punycode)
block_idn = true

# The default order optimized for OpenWrt
pipeline = [
    "Whitelist",   # 1. Instant pass
    "HotCache",    # 2. Local memory hits
    "StaticBlock", # 3. Exact match (Fast)
    "SuffixMatch", # 4. Wildcards (FST)
    "Heuristics",  # 5. DGA/Entropy (Math)
    "Upstream",    # 6. Fallback to Internet
]

[server.runtime]
# “auto” uses the number of logical CPU cores.
# An integer (e.g., 2) forces a specific number of threads.
worker_threads = 1

# Stack size per thread (in bytes).
# On OpenWrt, reducing this to 2MB (2 * 1024 * 1024) saves RAM.
stack_size = 2097152

# Capacity of the request queue per worker before rejecting requests.
max_blocking_threads = 512

[security.structure]
# Maximum number of dots (.) in a domain.
# More than 5 often indicates tunneling (e.g., data.part1.bin.zone.com)
max_subdomain_depth = 5

# Maximum allowed length for a fully qualified domain name (RFC max: 253)
max_domain_length = 128

# Reject domains that do not contain only a-z, 0-9, ‘.’, ‘-’, and ‘_’
force_lowercase_ascii = true

# --- Response Filtering (Inbound) ---
# Maximum length of a TXT field.
# SPF/DKIM records are often < 200 bytes.
# Tunneling often uses the maximum (255 per segment).
max_txt_record_length = 128

# Block if the response contains too many records (suspicious for exfiltration)
max_answers_per_query = 10

[security.lexical]
# Block by words in the domain and sub domains. It is useful for parental control
# since it avoids loading a blacklist of millions of records in RAM.
enabled = true

# Banned keywords (Full labels or separated by hyphens)
banned_keywords = ["porno", "casino", "drogue", "bet", "sex"]

# If true, the keyword must be a complete label (safer)
# If false, a simple .contains() is sufficient (more aggressive)
strict_keyword_matching = true

[security.intelligence]
# DGA & Lexical Analysis (The "Brain")
enabled = true
# Shannon entropy threshold (typically between 3.5 and 4.5)
# The higher the number, the more tolerant the system is of unusual names.
entropy_threshold = 4.0
# Use fast ASCII-only entropy (true) or full Unicode entropy (false)
# Fast mode uses zero heap allocation, ideal for OpenWrt/embedded.
entropy_fast = true
min_word_length = 8

# Consonant clustering detection
# Ratio threshold (e.g., 0.6 blocks domains with >60% consonants like "bcdfgh")
consonant_ratio_threshold = 0.6
# Max consecutive consonants (normal words rarely exceed 4, e.g., "strength")
max_consonant_sequence = 5

# -----------------------------------------------------------------------------
# N-Gram Language Model Analysis
# -----------------------------------------------------------------------------
# Detects "unnatural" character sequences by scoring domains against language
# models. A domain must pass at least ONE language model to be allowed (OR logic).
use_ngram_model = false

# N-Gram Implementation Mode:
# - true (default): Use embedded Markov matrices (~2.7 KB/language, zero-alloc)
#   Best for OpenWrt/embedded. No external files needed.
# - false: Load full N-gram tables from external .bin files (2-5 MB/language)
#   Higher accuracy but requires file I/O at startup.
ngram_use_embedded = true

# Languages for embedded mode (used when ngram_use_embedded = true)
# Supported: "english", "french", "german", "spanish", "italian"
ngram_embedded_languages = ["english", "french"]

# External model files (used when ngram_use_embedded = false)
ngram_models = ["/etc/dgaard/models/english.bin", "/etc/dgaard/models/french.bin"]

# Log-probability threshold (domains scoring below this in ALL models are blocked)
# Typical range: -6.0 (strict) to -3.0 (lenient). Default: -4.0
ngram_probability_threshold = -4.0

[security.idn]
# IDN filtering mode: "Off", "Strict" (block everything), "Smart" (european accent only)
# force_lowercase_ascii must be false to use it
mode = "Smart"
allowed_scripts = ["Latin", "WesternEuropean"]

[security.behavior]
# NXDOMAIN Hunting (Detects infected clients scanning for C2)
nxdomain_threshold = 15
nxdomain_window = 60

# Tunneling/Exfiltration Detection
max_subdomains_per_minute = 50
max_label_length = 60

# --- Response Filtering (Inbound / DPI Lite) ---
[security.inbound]
# Enable Deep Packet Inspection on DNS answers
enabled = true

# Rejects responses where TXT records have high entropy (sign of tunneling)
# Similar to domain entropy, but applied to the TXT payload.
max_txt_entropy = 4.5

# Follow CNAME chains and block if the final destination is blacklisted
unmask_cname_cloaking = true

# Anti-DNS Rebinding: Block public domains resolving to local IPs
# (127.0.0.1, 192.168.x.x, 10.x.x.x, etc.)
block_private_ip_in_public_res = true

# Block specific query types often used for tunneling or reconnaissance
# e.g., ["NULL", "ANY", "HINFO"]
forbidden_qtypes = ["NULL"]

[upstream]
# Where the proxy forwards "clean" queries
# Using DNS-over-HTTPS (DoH) or standard UDP
servers = ["1.1.1.1:53", "9.9.9.9:53"]
timeout_ms = 2000

# -----------------------------------------------------------------------------
# TLD Filtering
# -----------------------------------------------------------------------------
[tld]
# If not empty, only these TLDs are resolved.
# allow_only = [".com", ".net", ".org", ".io"]
# Block high-risk TLDs common in malware/DGA
exclude = [".top", ".xyz", ".bid", ".country", ".stream", ".gdn"]

# Conditional blocking: blocks if it contains a banned_keyword AND this TLD
suspicious_tlds = [
    ".biz",
    ".bible",
    ".top",
    ".su",
    ".li",
    ".es",
    ".sbs",
    ".cfd",
    ".ru",
    ".pub",
    # also works without dots
    "so",
    "icu",
    "re",
    "ua",
    "online",
    "ro",
    "click",
    "ar",
    "vip",
    "xin",
    "cn",
    "xyz",
    "bond",
    "cc",
    "win",
    "help",
    "support",
    "quest",
    "buzz",
    "fyi"
]

# DNS Rebinding Shield configuration.
#
# Rejects upstream DNS answers that map a public domain to a private or
# reserved IP address. This closes the DNS rebinding attack vector where
# an attacker's domain briefly resolves to a LAN IP to reach internal hosts.
#
# ## Covered private ranges
# | Range           | Spec       | Threat                              |
# |-----------------|------------|-------------------------------------|
# | 0.0.0.0/8       | RFC 1122   | "This" network, unroutable          |
# | 10.0.0.0/8      | RFC 1918   | Private LAN                         |
# | 100.64.0.0/10   | RFC 6598   | Shared address space / CGNAT        |
# | 127.0.0.0/8     | RFC 1122   | Loopback                            |
# | 169.254.0.0/16  | RFC 3927   | Link-local / APIPA                  |
# | 172.16.0.0/12   | RFC 1918   | Private LAN                         |
# | 192.168.0.0/16  | RFC 1918   | Private LAN                         |
# | ::1/128         | RFC 4291   | IPv6 loopback                       |
# | fc00::/7        | RFC 4193   | IPv6 unique local                   |
# | fe80::/10       | RFC 4291   | IPv6 link-local                     |
[security.rebinding_shield]
enabled = true

# Low-TTL suspicion scoring configuration.
#
# DNS responses with a very short TTL are characteristic of fast-flux malware
# infrastructure, where IP addresses rotate rapidly to evade static blocklists.
# Legitimate CDNs can also use short TTLs, so this check adds suspicion points
# rather than blocking outright — it contributes to the cumulative score.
[security.low_ttl]
enabled = true
# TTL threshold in seconds. Responses with `min_ttl < threshold_secs`
# add `LOW_TTL` suspicion points (default: 10 s).
threshold_secs = 10

# ASN (Autonomous System Number) IP-range filtering.
#
# Blocks DNS responses that resolve to IP addresses within the configured CIDR
# ranges. Intended for blocking known-malicious autonomous systems such as:
#   - Crypto mining pool infrastructure
#   - Bulletproof hosting providers
#   - Known C2 (command-and-control) server networks
#
# Unlike blocklists that enumerate domains, this filter targets IP space,
# catching fast-flux campaigns that rotate through many domains but use a
# stable set of hosting ranges.
#
# CIDR ranges are pre-parsed once at startup — hot-path matching is O(1) per IP.
# Disabled by default: requires explicit operator configuration derived from
# threat intelligence feeds (e.g., Spamhaus ASN DROP list, abuse.ch, etc.).
#
# ## Address families
# Both IPv4 and IPv6 CIDR notation are supported in the same list.
#
# ## Examples
# RFC 5737 documentation ranges used here — replace with real threat intel data.
[security.asn_filter]
enabled = false
# blocked_ranges = [
#   "203.0.113.0/24",   # IPv4 documentation range (RFC 5737)
#   "198.51.100.0/24",  # IPv4 documentation range (RFC 5737)
#   "2001:db8::/32",    # IPv6 documentation range (RFC 3849)
# ]

# -----------------------------------------------------------------------------
# Behavior Monitoring
# -----------------------------------------------------------------------------
[nxdomain_hunting]
enabled = true
# Number of NXDOMAINs before a client is flagged
threshold = 15
# Time window in seconds
window_seconds = 60
# Action: "log" or "block_client" (via firewall integration)
action = "log"

[tunneling_detection]
enabled = true
# Max unique subdomains per SLD (e.g., v1.x.example.com)
max_subdomains_per_minute = 50
# Max length of a single label (detects Base64 payloads)
max_label_length = 60

# -----------------------------------------------------------------------------
# File-Based Sources
# -----------------------------------------------------------------------------
[sources]
# Newly Registered Domains (NRD)
# This file should be updated daily via cron
nrd_list_path = "/tmp/nrd_daily.txt"

# Static blocklists (Support for multiple files)
# You can get some here: https://filterlists.com/
blacklists = [
    # "/etc/dgaard/lists/adaway.txt",
    # "/etc/dgaard/lists/malware_domains.txt",
    "https://raw.githubusercontent.com/Perflyst/PiHoleBlocklist/refs/heads/master/SmartTV.txt",
    "https://pgl.yoyo.org/as/serverlist.php?hostformat=adblock;showintro=1&mimetype=plaintext",
    "https://filters.adtidy.org/extension/ublock/filters/11.txt",
    # "https://easylist.to/easylist/easylist.txt",
    "https://easylist-downloads.adblockplus.org/liste_ar+liste_fr+easylist.txt",

    # annoyances
    "https://filters.adtidy.org/extension/ublock/filters/14.txt",
    # "https://easylist-downloads.adblockplus.org/fanboy-annoyance.txt"
    # "https://fanboy.co.nz/enhancedstats.txt"

    # widgets
    "https://filters.adtidy.org/windows/filters/22.txt",

    # cookie notice
    "https://www.i-dont-care-about-cookies.eu/abp/",

    # privacy
    "https://filters.adtidy.org/extension/ublock/filters/118_optimized.txt",
    # "https://filters.adtidy.org/extension/ublock/filters/3.txt"
    # "https://filters.adtidy.org/windows/filters/17.txt"

    # malware
    "https://raw.githubusercontent.com/DandelionSprout/adfilt/master/Alternate%20versions%20Anti-Malware%20List/AntiMalwareAdGuard.txt"
]

# Whitelists (Overwrites all other filters)
whitelists = [
    # "/etc/dgaard/lists/personal_whitelist.txt",
    # "/etc/dgaard/lists/cdn_providers.txt"
    "https://raw.githubusercontent.com/anudeepND/whitelist/master/domains/whitelist.txt"
]

update_interval_hours = 24
# If the download fails, how long to wait before retrying
retry_delay_mins = 30

# Binary index mapping each xxh3_64 hash to its source domain string.
# External tools (dashboard, scripts) can use this file to resolve a hash
# back to a human-readable domain without loading the full blocklist.
# Set to "" to disable.
host_index_path = "/var/dgaard/host_mapping.bin"

# Plain text file collecting ABP cosmetic/element-hiding/scriptlet rules
# that are ignored by the DNS filter. Import this file into a browser
# extension (e.g. uBlock Origin) to get full ad/tracker blocking.
# Set to "" to disable.
browser_rules_path = "/var/dgaard/browser_rules.txt"

[abp]
# Since many ABP rules are COSMETIC (CSS), we only extract Network/Domain rules.
extract_domain_only = true
# Update interval in hours
update_interval = 24

# -----------------------------------------------------------------------------
# Performance & Caching (The "Missed" items)
# -----------------------------------------------------------------------------
[cache]
# Cache successful results to reduce upstream latency
enabled = true
max_entries = 10000
ttl_override = 0    # 0 means use the TTL from the DNS record

[memory]
# LRU Cache for frequent queries
cache_enabled = true
# LRU cache size in input count
cache_size = 5000

# Bloom filter
# Optimization for OpenWrt (use Bloom Filters for large lists)
use_bloom_filter = true
# Estimated entries for Bloom Filter (influences RAM usage)
expected_total_domains = 1000000

# Suspicion score thresholds and logging policy.

# Controls at what score level domains are blocked, flagged as highly
# suspicious, or flagged as suspicious. Logging for the two lower tiers
# can be independently enabled to stream telemetry to the Unix socket
# without affecting blocking behaviour.
[security.scoring]
# Score at or above which a domain is considered malicious and blocked.
# Default: 10.
# blocking_threshold = 10 

# Score at or above which a domain is considered highly suspicious.
# Queries above this threshold but below `blocking_threshold` are
# forwarded but always emitted as `HighlySuspicious` events on the
# stats socket.
# Default: 7.
# highly_suspicious_threshold = 7

# Score at or above which a domain is considered suspicious.
# Only emitted as a `Suspicious` stats event when `log_suspicious`
# is `true`.
# Default: 4.
# suspicious_threshold = 4

# Emit `Suspicious` stats events for domains that reach
# `suspicious_threshold` but not `highly_suspicious_threshold`.
# Default: `false`.
# log_suspicious = false
