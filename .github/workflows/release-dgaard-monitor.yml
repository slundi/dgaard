name: Release dgaard-monitor

on:
  push:
    branches:
      - release
    paths:
      - 'dgaard-monitor/Cargo.toml'
      - 'dgaard-monitor/src/**'

# NOTE: dgaard-monitor depends on `inotify`, which is Linux-only.
# macOS and Windows targets are intentionally excluded.

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version changed
        id: check
        run: |
          CURRENT=$(grep '^version' dgaard-monitor/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          PREVIOUS=$(git show HEAD^1:dgaard-monitor/Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*= *"\(.*\)"/\1/' || echo "0.0.0")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT), skipping release."
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-${{ matrix.target }}-cargo-

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }} -p dgaard-monitor

      - name: Package binary
        run: |
          tar czf dgaard-monitor-v${{ needs.check-version.outputs.version }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release dgaard-monitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dgaard-monitor-${{ matrix.target }}
          path: dgaard-monitor-v*.tar.gz
          if-no-files-found: error

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dgaard-monitor-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dgaard-monitor-v${{ needs.check-version.outputs.version }}
          name: "dgaard-monitor v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          files: dgaard-monitor-v*.tar.gz
